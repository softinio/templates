name: "CI"
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        scala-version: ["3.3.8", "3.8.4"]
    steps:
    - uses: actions/checkout@v4

    - uses: cachix/install-nix-action@v31
      with:
        github_access_token: ${{ secrets.GITHUB_TOKEN }}

    # Cache Mill dependencies
    - name: Cache Mill
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/mill
          ~/.cache/coursier
          out/
        key: ${{ runner.os }}-mill-${{ hashFiles('build.mill') }}
        restore-keys: |
          ${{ runner.os }}-mill-

    # Run tests for specific Scala version
    - name: Run tests for Scala ${{ matrix.scala-version }}
      run: |
        nix develop --command mill "mylibrary[${{ matrix.scala-version }}].test"

    # Check code formatting
    - name: Check code formatting
      if: matrix.scala-version == '3.8.4'
      run: |
        nix develop --command mill mill.scalalib.scalafmt.ScalafmtModule/checkFormatAll __.sources

    # Build documentation
    - name: Generate documentation
      if: matrix.scala-version == '3.8.4'
      run: |
        nix develop --command mill "mylibrary[3.8.4].docJar"

    # Upload test results
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.scala-version }}
        path: |
          out/mylibrary/${{ matrix.scala-version }}/test/
        retention-days: 7

  site:
    name: Generate Site
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: cachix/install-nix-action@v31
      with:
        github_access_token: ${{ secrets.GITHUB_TOKEN }}

    # Cache Mill dependencies
    - name: Cache Mill
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/mill
          ~/.cache/coursier
        key: ${{ runner.os }}-mill-docs-${{ hashFiles('build.mill') }}
        restore-keys: |
          ${{ runner.os }}-mill-docs-

    # Generate site
    - name: Generate site
      run: |
        nix develop --command mill --no-server docs.build

    # Publish site
    - name: Publish site
      if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@v4.0.0
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: site/target/docs/site
        keep_files: true
